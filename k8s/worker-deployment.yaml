apiVersion: apps/v1
kind: Deployment
metadata:
  name: gml-worker
  labels:
    app: gml-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gml-worker
  template:
    metadata:
      labels:
        app: gml-worker
        component: worker
    spec:
      containers:
      - name: gml-worker
        image: gml-infrastructure:latest
        env:
        - name: APP_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: gml-secrets
              key: database-url
        - name: REDIS_HOST
          value: "redis-service"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: CELERY_BROKER_URL
          value: "amqp://guest:guest@rabbitmq-service:5672//"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-service:6379/0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        command: ["celery", "-A", "src.gml.workers.celery_app", "worker", "--loglevel=info"]
