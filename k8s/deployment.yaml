apiVersion: apps/v1
kind: Deployment
metadata:
  name: gml-api
  labels:
    app: gml-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gml-api
  template:
    metadata:
      labels:
        app: gml-api
        component: api
    spec:
      containers:
      - name: gml-api
        image: gml-infrastructure:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: APP_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: gml-secrets
              key: database-url
        - name: REDIS_HOST
          value: "redis-service"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gml-api-service
spec:
  selector:
    app: gml-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
